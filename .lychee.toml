verbose = "info"
include_mail = false
timeout = 20
max_retries = 2
retry_wait_time = 2
max_concurrency = 10
skip_missing = true

exclude = [
  "^http://localhost",
  "^https://localhost",
  "^http://127\\.0\\.0\\.1",
  "^https://127\\.0\\.0\\.1",
  # External hosts whose live status is unreliable for anonymous CI fetches.
  # These URLs are correct and reachable for human visitors; the link-check
  # CI sees rate-limit / anti-bot 404s and intermittent network errors.
  "^https://github\\.com/aegis-initiative/aegis-core",
  "^https://sovereignshield\\.io",
  # LinkedIn returns 999 to all automated crawlers (anti-scraping).
  # Profile URLs are valid; lychee cannot verify them.
  "^https://(?:www\\.)?linkedin\\.com/in/",
  # Forbes blocks automated requests with 403.
  "^https://www\\.forbes\\.com/",
]

# 202: eur-lex.europa.eu (EU AI Act) returns 202 Accepted instead of 200
accept = [200, 202, 206, 429]

exclude_path = [
  "archive/**"
]
