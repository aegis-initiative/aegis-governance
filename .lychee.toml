verbose = "info"
include_mail = false
timeout = 20
max_retries = 2
retry_wait_time = 2
max_concurrency = 10
skip_missing = true

exclude = [
  "^http://localhost",
  "^https://localhost",
  "^http://127\\.0\\.0\\.1",
  "^https://127\\.0\\.0\\.1"
]

accept = [200, 206, 429]

exclude_path = [
  "archive/**"
]
