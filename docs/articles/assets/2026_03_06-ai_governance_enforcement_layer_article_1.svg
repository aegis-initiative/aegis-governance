<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">AEGIS Runtime Governance Flow</title>
  <desc id="desc">AI Agent submits ACTION_PROPOSE to Governance Gateway. Decision Engine evaluates capability, policy, and actor identity context, emits decision outcomes, and writes audit logging.</desc>

  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .agent { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .runtime { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
      .gateway { fill: #ffffff; stroke: #2563eb; stroke-width: 1.8; }
      .decisionEngine { fill: #ffffff; stroke: #3730a3; stroke-width: 2.2; }
      .support { fill: #ffffff; stroke: #64748b; stroke-width: 1.6; }
      .audit { fill: #ffffff; stroke: #0f766e; stroke-width: 1.8; }
      .decision { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .outcomeAllow { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .outcomeDeny { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
      .outcomeEscalate { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .outcomeConfirm { fill: #e0e7ff; stroke: #4f46e5; stroke-width: 1.5; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; }
      .connector { stroke: #64748b; stroke-width: 1.8; fill: none; }
      .auditLine { stroke: #0f766e; stroke-width: 2; fill: none; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="smallArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
    <marker id="auditArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0f766e" />
    </marker>
  </defs>

  <text x="640" y="54" text-anchor="middle" class="title">AI Governance Enforcement Flow (AEGIS)</text>

  <rect x="470" y="86" width="340" height="86" rx="14" class="agent" />
  <text x="640" y="138" text-anchor="middle" class="label">AI Agent</text>

  <line x1="640" y1="172" x2="640" y2="236" class="arrow" marker-end="url(#arrowhead)" />
  <text x="662" y="214" class="small">ACTION_PROPOSE</text>

  <rect x="170" y="248" width="940" height="460" rx="18" class="runtime" />
  <text x="640" y="292" text-anchor="middle" class="label">Governance Runtime</text>

  <rect x="480" y="320" width="320" height="60" rx="10" class="gateway" />
  <text x="640" y="358" text-anchor="middle" class="text">Governance Gateway</text>

  <rect x="460" y="430" width="360" height="66" rx="12" class="decisionEngine" />
  <text x="640" y="470" text-anchor="middle" class="label">Decision Engine</text>

  <line x1="640" y1="380" x2="640" y2="430" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="220" y="520" width="250" height="56" rx="10" class="support" />
  <text x="345" y="555" text-anchor="middle" class="text">Capability Registry</text>

  <rect x="515" y="520" width="250" height="56" rx="10" class="support" />
  <text x="640" y="555" text-anchor="middle" class="text">Policy Engine</text>

  <line x1="345" y1="520" x2="560" y2="496" class="connector" marker-end="url(#smallArrow)" />
  <line x1="640" y1="520" x2="640" y2="496" class="connector" marker-end="url(#smallArrow)" />

  <rect x="520" y="610" width="240" height="54" rx="10" class="audit" />
  <text x="640" y="644" text-anchor="middle" class="text">Audit Logging</text>

  <line x1="780" y1="462" x2="900" y2="462" class="auditLine" marker-end="url(#auditArrow)" />
  <line x1="900" y1="462" x2="900" y2="637" class="auditLine" />
  <line x1="900" y1="637" x2="760" y2="637" class="auditLine" marker-end="url(#auditArrow)" />

  <line x1="640" y1="708" x2="640" y2="770" class="arrow" marker-end="url(#arrowhead)" />

  <rect x="510" y="782" width="260" height="80" rx="14" class="decision" />
  <text x="640" y="832" text-anchor="middle" class="label">Decision</text>

  <rect x="140" y="900" width="220" height="56" rx="10" class="outcomeAllow" />
  <text x="250" y="935" text-anchor="middle" class="text">ALLOW</text>

  <rect x="390" y="900" width="220" height="56" rx="10" class="outcomeDeny" />
  <text x="500" y="935" text-anchor="middle" class="text">DENY</text>

  <rect x="640" y="900" width="220" height="56" rx="10" class="outcomeEscalate" />
  <text x="750" y="935" text-anchor="middle" class="text">ESCALATE</text>

  <rect x="890" y="900" width="250" height="56" rx="10" class="outcomeConfirm" />
  <text x="1015" y="935" text-anchor="middle" class="text">REQUIRE_CONFIRMATION</text>

  <line x1="640" y1="862" x2="250" y2="900" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="640" y1="862" x2="500" y2="900" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="640" y1="862" x2="750" y2="900" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="640" y1="862" x2="1015" y2="900" class="arrow" marker-end="url(#arrowhead)" />
</svg>
